slam_toolbox:
  ros__parameters:

    # Kullanılacak solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Harita frame ayarları
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping  # mapping veya localization

    # Harita güncelleme parametreleri
    map_update_interval: 5.0       # saniye — ne sıklıkla harita güncellenir
    resolution: 0.05               # metre/piksel — 5 cm
    max_laser_range: 15.0          # lidar'ın max_range ile aynı olmalı
    minimum_travel_distance: 0.15   # metre — ne kadar gidince yeni scan alınır
    minimum_travel_heading: 0.1
    minimum_time_interval: 0.5    # radyan — ~17°

    # Loop closure (kapalı alan düzeltme)
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Tarama eşleştirme
    correlation_search_space_dimension: 0.8
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Bant genişliği / performans
    stack_size_to_use: 40000000    # 40 MB

    # TF zaman aşımı
    transform_publish_period: 0.02
    tf_buffer_duration: 30.0

    # Debug / görselleştirme
    debug_logging: false
    throttle_scans: 1
    enable_interactive_mode: true