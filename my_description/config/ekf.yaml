ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true  # Rover düzlemde hareket ettiği için Z ekseni hesaplamalarını kapatır
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. STM32'den Gelen Tekerlek Odometrisi (Sadece X ve Y hızlarına güveniyoruz)
    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false, # Sadece X ve Y'deki doğrusal hızlar
                   false, false, false,
                   false, false, false]
    odom0_differential: false

    # 2. IMU'dan Gelen Veri (Dönüşler için tamamen IMU'ya güveniyoruz)
    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, true,  # Sadece Yaw (Z ekseni yönelimi)
                  false, false, false,
                  false, false, true,  # Yaw açısal hızı
                  false, false, false]
    imu0_differential: false
    imu0_relative: true