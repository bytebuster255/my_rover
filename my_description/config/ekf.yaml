ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # URDF'de base_footprint'e geçmiştik, burayı da güncellemelisin
    world_frame: odom

    # 1. Sensör: Tekerlek Odometrisi (odometry_node.py'den gelmeli)
    odom0: odom
    odom0_config: [false, false, false, # Pozisyonu tekerlekten alma
                   false, false, false, 
                   true,  false, false, # SADECE X Hızına (İleri/Geri) güven
                   false, false, false, 
                   false, false, false] # Skid-steer patinaj yaptığı için dönüş hızına (Yaw Velocity) güvenme



    # 3. Sensör: IMU (Madgwick Filtresinden Gelen Veri)
    # NOT: Madgwick varsayılan olarak /imu/data topic'ine quaternion (yönelim) yayınlar.
    imu0: imu/data
    imu0_config: [false, false, false, 
                  false, false, true,  # SADECE YAW Yönelimine (Açısına) kesinlikle güven!
                  false, false, false, 
                  false, false, true,  # YAW Hızına (Dönüş hızına) kesinlikle güven!
                  false, false, false]
    
    # Sensörlerin başlıklarındaki (header) frame_id'leri umursamadan zorla base_link'e göre hesapla
    odom0_relative: false
    odom1_relative: false
    imu0_relative: false